<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的物品清单</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>📦 我的物品清单</h1>
      <div class="header-actions">
        <button id="btn-export" class="btn btn-secondary">导出 JSON</button>
        <label class="btn btn-secondary">
          导入 JSON
          <input type="file" id="import-file" accept=".json" hidden />
        </label>
        <button id="btn-add" class="btn btn-primary">+ 添加物品</button>
      </div>
    </header>

    <div class="toolbar">
      <input type="text" id="search" placeholder="搜索物品名称..." />
      <select id="filter-category">
        <option value="">全部分类</option>
      </select>
    </div>

    <div id="stats" class="stats"></div>

    <div id="item-list" class="item-list"></div>
  </div>

  <!-- 添加/编辑弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">添加物品</h2>
      <form id="item-form">
        <input type="hidden" id="edit-id" />
        <label>名称 *
          <input type="text" id="f-name" required placeholder="物品名称" />
        </label>
        <label>分类
          <input type="text" id="f-category" placeholder="如：电子、家具、衣物" list="category-list" />
          <datalist id="category-list"></datalist>
        </label>
        <label>数量
          <input type="number" id="f-qty" min="1" value="1" />
        </label>
        <label>存放位置
          <input type="text" id="f-location" placeholder="如：书房、衣柜" />
        </label>
        <label>备注
          <textarea id="f-note" rows="3" placeholder="可选备注"></textarea>
        </label>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
