<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物品清单</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>物品清单</h1>
      <div class="header-actions">
        <button id="btn-export" class="btn">导出</button>
        <label class="btn">导入<input type="file" id="import-file" accept=".json" hidden /></label>
        <button id="btn-add" class="btn btn-primary">+ 添加</button>
      </div>
    </header>

    <div class="toolbar">
      <input type="text" id="search" placeholder="搜索..." />
    </div>

    <div id="stats" class="stats"></div>
    <div id="item-list"></div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">添加物品</h2>
      <form id="item-form">
        <input type="hidden" id="edit-id" />
        <label>名称
          <input type="text" id="f-name" required placeholder="物品名称" />
        </label>
        <label>物品分类
          <input type="text" id="f-category" placeholder="选择或输入分类…" list="category-list" />
          <datalist id="category-list"></datalist>
        </label>
        <label>子分类
          <input type="text" id="f-subcategory" placeholder="选择或输入子分类…" list="subcategory-list" />
          <datalist id="subcategory-list"></datalist>
        </label>
        <label>数量
          <input type="number" id="f-qty" min="1" value="1" />
        </label>
        <label>区域
          <input type="text" id="f-location" placeholder="选择或输入区域…" list="location-list" />
          <datalist id="location-list">
            <option value="厨房">
            <option value="卫生间">
            <option value="卧室">
            <option value="书桌">
            <option value="客厅">
            <option value="储物间">
          </datalist>
        </label>
        <label>备注
          <textarea id="f-note" rows="2" placeholder="可选"></textarea>
        </label>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
